# =============================================================================
# Cucumber Parallel Execution Configuration
# =============================================================================

# Enable parallel scenario execution within a single JVM fork.
# Override at runtime: mvn test -Dcucumber.execution.parallel.enabled=false
cucumber.execution.parallel.enabled=true

# Parallelism strategy:
#   dynamic = thread count equals availableProcessors (recommended - auto-scales on CI and local)
#   fixed   = use a specific thread count defined below
cucumber.execution.parallel.config.strategy=dynamic

# Uncomment to switch to a fixed thread count instead of dynamic:
# cucumber.execution.parallel.config.strategy=fixed
# cucumber.execution.parallel.config.fixed.parallelism=4

# =============================================================================
# Scenario Thread Safety
# =============================================================================

# Scenarios tagged @Sequential will be isolated to a single thread.
# SAME_THREAD  = scenario and its Background always run on the same thread (safest default)
# CONCURRENT   = hooks may run on different threads (faster, but steps must be thread-safe)
cucumber.execution.exclusive-resources.@Sequential.read-write=INSTANCE
